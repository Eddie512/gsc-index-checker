# Deploy the worker on pushes to main, always applying D1 migrations first.
#
# Ordering matters: the worker reads tables/indexes the migrations create
# (e.g. pageview_daily, the INDEXED BY-pinned index), so deploying code before
# its migration would break /api/traffic and the cron until the migration ran.
# `wrangler d1 migrations apply` records applied files in a d1_migrations
# table, so each migration runs exactly once no matter how many deploys happen.
#
# Requires the CLOUDFLARE_API_TOKEN repo secret (Workers Scripts:Edit +
# D1:Edit). wrangler.toml is developer-local (gitignored), so the job builds
# it from wrangler.toml.example with the production database id.
name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 7d5b1c8241ba79b86f7bf40e6bb4ca22
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler.toml
        run: sed 's/^database_id = .*/database_id = "f222157b-c595-4a6f-a690-4ee5d664ddfe"/' wrangler.toml.example > wrangler.toml

      - name: Run tests
        run: npm test

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply gsc-index-checker --remote

      - name: Deploy worker
        run: npx wrangler deploy
